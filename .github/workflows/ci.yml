name: ci-health-check

# To block merge until this passes: repo Settings → Branches → rule for main → require check "ci-health-check / build".

# Run only for pull requests into main (not direct pushes to main).
on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json
            packages/shared/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix packages/shared
          npm ci --prefix apps/backend
          npm ci --prefix apps/frontend

      - name: Shared check
        run: npm run ci:check --prefix packages/shared

      - name: Frontend check
        run: npm run ci:check --prefix apps/frontend

      - name: Backend check
        run: npm run ci:check --prefix apps/backend
